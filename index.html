<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        font-family: Arial, sans-serif;
        overflow-x: hidden;
    }

    .container {
        min-height: 100vh;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
        text-align: center;
    }

    .header_text {
        font-size: clamp(1.8rem, 5vw, 3rem);
        padding: 0 10px;
    }

    .gif_container {
        width: 100%;
        max-width: 350px;
    }

    .gif_container img {
        width: 100%;
        height: auto;
        border-radius: 12px;
    }

    .buttons {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .btn {
        min-width: 120px;
        padding: 14px 24px;
        font-size: 1rem;
        cursor: pointer;
        border: none;
        border-radius: 10px;
    }

    #noButton {
        position: relative;
    }

    @media (max-width: 480px) {
        .buttons {
            flex-direction: column;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            width: 100%;
        }
    }
</style>

</head>

```
<audio id="bgMusic" loop>
    <source src="pleasejoin.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1 class="header_text">
        magpa membership ka na sa org ;-; plsplspls
    </h1>

    <div class="gif_container">
        <img src="kilig.jpg" alt="kupal ka talaga boss">
    </div>

    <div class="buttons">
        <button class="btn" id="yesButton" onclick="nextPage()">
            Yes
        </button>

        <button
            class="btn"
            id="noButton"
            onmouseover="moveButton()"
            ontouchstart="moveButton()"
            onclick="moveButton()">
            No
        </button>
    </div>
</div>

<script>
    const music = document.getElementById("bgMusic");

    function startMusic() {
        music.play().catch(() => {});
        document.removeEventListener("click", startMusic);
        document.removeEventListener("touchstart", startMusic);
    }

    document.addEventListener("click", startMusic);
    document.addEventListener("touchstart", startMusic);

    function nextPage() {
        window.location.href = "Yes.html";
    }

    function moveButton() {
        const button = document.getElementById("noButton");

        const maxX = window.innerWidth - button.offsetWidth - 20;
        const maxY = window.innerHeight - button.offsetHeight - 20;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        button.style.position = "fixed";
        button.style.left = x + "px";
        button.style.top = y + "px";
    }
</script>
